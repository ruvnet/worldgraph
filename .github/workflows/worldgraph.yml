# GitHub Actions harness: worldgraph
# Generated by metaharness (host: github-actions, ADR-033).
name: worldgraph

on:
  workflow_dispatch: {}
  issue_comment:
    types: [created]

# ADR-022 default-deny: contents:read only. Widen via the harness policy.
permissions:
  contents: read

jobs:
  worldgraph:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/worldgraph
        with:
          task: ${{ github.event.comment.body || github.event_name }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
